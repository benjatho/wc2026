<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC2026">
<title>WC2026 Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --gold: #F5C842;
    --teal: #0A7E6E;
    --teal-light: #0D9B88;
    --dark: #0D1117;
    --darker: #080C10;
    --card: #161B22;
    --card2: #1C2330;
    --border: #30363D;
    --text: #E6EDF3;
    --muted: #8B949E;
    --green: #3FB950;
    --red: #F85149;
    --amber: #D29922;
    --own: rgba(245,200,66,0.15);
    --own-border: #F5C842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--darker) 0%, #0A1628 50%, #0D1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
  }

  .header-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }

  .last-updated {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
  }

  .refresh-btn {
    background: var(--teal);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .refresh-btn:active { opacity: 0.7; }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CONTENT */
  .content { display: none; }
  .content.active { display: block; }

  /* BRACKET VIEW */
  .bracket-container {
    padding: 12px;
    overflow-x: auto;
  }

  .bracket-scroll {
    min-width: 900px;
    position: relative;
  }

  .bracket-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 12px;
  }

  /* Stage labels */
  .stage-labels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 80px 1fr 1fr 1fr;
    gap: 4px;
    margin-bottom: 8px;
  }

  .stage-label {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--teal-light);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 4px;
    background: var(--card);
    border-radius: 4px;
  }

  /* MATCH CARD */
  .match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 8px;
    margin: 3px 0;
    position: relative;
    transition: border-color 0.2s;
  }

  .match.has-sweepstake {
    border-color: var(--own-border);
    background: linear-gradient(135deg, var(--card) 0%, rgba(245,200,66,0.05) 100%);
  }

  .match.live {
    border-color: var(--green);
    animation: pulse-border 2s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { border-color: var(--green); }
    50% { border-color: rgba(63,185,80,0.3); }
  }

  .match-teams {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .team-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 4px;
    border-radius: 4px;
  }

  .team-row.winner {
    background: rgba(63,185,80,0.1);
  }

  .team-row.loser {
    opacity: 0.45;
  }

  .team-flag {
    font-size: 16px;
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .team-name {
    font-size: 11px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .team-score {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .sweepstake-badge {
    font-size: 9px;
    background: var(--own-border);
    color: var(--darker);
    border-radius: 3px;
    padding: 1px 4px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .match-status {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    margin-top: 3px;
  }

  .match-status.live-text { color: var(--green); font-weight: 700; }
  .match-status.tbd { color: var(--amber); }

  .match-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 3px 0;
  }

  /* BRACKET GRID LAYOUT */
  .bracket-grid {
    display: grid;
    grid-template-columns: 160px 140px 120px 80px 120px 140px 160px;
    gap: 8px;
    align-items: center;
  }

  .bracket-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .bracket-col.r32 { gap: 4px; }
  .bracket-col.r16 { gap: 32px; }
  .bracket-col.qf { gap: 80px; }
  .bracket-col.sf { gap: 180px; }

  .final-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .trophy {
    font-size: 40px;
    text-align: center;
    filter: drop-shadow(0 0 12px rgba(245,200,66,0.6));
  }

  .final-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--gold);
    text-align: center;
  }

  .final-date {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
  }

  /* PRIZES VIEW */
  .prizes-container {
    padding: 12px;
  }

  .prize-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--teal-light);
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  .prize-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .prize-card.leading {
    border-color: var(--amber);
    background: rgba(210,153,34,0.05);
  }

  .prize-card.confirmed {
    border-color: var(--green);
    background: rgba(63,185,80,0.05);
  }

  .prize-emoji { font-size: 24px; flex-shrink: 0; }

  .prize-info { flex: 1; }

  .prize-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .prize-winner {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .prize-winner.has-winner { color: var(--text); }

  .prize-pot {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  .prize-status {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .prize-status.leading {
    background: rgba(210,153,34,0.2);
    color: var(--amber);
  }

  .prize-status.confirmed {
    background: rgba(63,185,80,0.2);
    color: var(--green);
  }

  /* TEAMS VIEW */
  .teams-container { padding: 12px; }

  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .team-card.eliminated {
    opacity: 0.5;
    border-color: var(--red);
  }

  .team-card.deep {
    border-color: var(--green);
  }

  .team-flag-big { font-size: 28px; flex-shrink: 0; }

  .team-info { flex: 1; }

  .team-person {
    font-size: 13px;
    font-weight: 700;
  }

  .team-country {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .team-stage {
    text-align: right;
    flex-shrink: 0;
  }

  .stage-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
    display: inline-block;
  }

  .stage-badge.group { background: var(--card2); color: var(--muted); }
  .stage-badge.r32 { background: rgba(13,155,136,0.2); color: var(--teal-light); }
  .stage-badge.r16 { background: rgba(13,155,136,0.3); color: var(--teal-light); }
  .stage-badge.qf { background: rgba(245,200,66,0.2); color: var(--gold); }
  .stage-badge.sf { background: rgba(245,200,66,0.3); color: var(--gold); }
  .stage-badge.final { background: rgba(245,200,66,0.5); color: var(--gold); }
  .stage-badge.out { background: rgba(248,81,73,0.15); color: var(--red); }

  .team-goals {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ERROR */
  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 12px;
    margin: 12px;
    font-size: 12px;
    color: var(--red);
  }

  /* FAMILY SECTION */
  .family-section {
    background: var(--card2);
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 6px;
  }

  .family-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--teal-light);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Connector lines for bracket */
  .connector {
    position: absolute;
    border: 1px solid var(--border);
    pointer-events: none;
  }

  /* LIVE DOT */
  .live-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 4px;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .empty-bracket {
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 11px;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-title">⚽ WC2026 SWEEPSTAKE</div>
    <div class="header-sub">Route to the Final — New Jersey, 19 July</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    <div class="last-updated" id="lastUpdated">Loading...</div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('bracket')">🏆 Bracket</div>
  <div class="tab" onclick="showTab('teams')">👤 My Teams</div>
  <div class="tab" onclick="showTab('prizes')">🎖️ Prizes</div>
  <div class="tab" onclick="showTab('families')">👨‍👩‍👧‍👦 Families</div>
</div>

<div id="loadingEl" class="loading">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:13px">Loading live data...</div>
</div>

<div id="errorEl" class="error-msg" style="display:none"></div>

<div id="bracketView" class="content"></div>
<div id="teamsView" class="content"></div>
<div id="prizesView" class="content"></div>
<div id="familiesView" class="content"></div>

<script>
const WC_ID = "WC";

// ── Sweepstake mapping ──────────────────────────────────────
const ADULT_TEAMS = {
  "Turkey":      { person:"Ben",    family:"ET",        elo:15, flag:"🇹🇷", display:"Türkiye" },
  "Colombia":    { person:"Sally",  family:"ET",        elo:5,  flag:"🇨🇴", display:"Colombia" },
  "Brazil":      { person:"Justin", family:"Eede",      elo:6,  flag:"🇧🇷", display:"Brazil" },
  "Argentina":   { person:"Lucy",   family:"Eede",      elo:2,  flag:"🇦🇷", display:"Argentina" },
  "England":     { person:"Rob",    family:"Morrison",  elo:4,  flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", display:"England" },

  "Norway":      { person:"Dan",    family:"Pound",     elo:11, flag:"🇳🇴", display:"Norway" },
  "Mexico":      { person:"Krista", family:"Pound",     elo:18, flag:"🇲🇽", display:"Mexico" },
  "Japan":       { person:"Tom",    family:"Currie",    elo:16, flag:"🇯🇵", display:"Japan" },
  "Germany":     { person:"Julie",  family:"Currie",    elo:12, flag:"🇩🇪", display:"Germany" },
  "Netherlands": { person:"Adam",   family:"Gallagher", elo:8,  flag:"🇳🇱", display:"Netherlands" },
  "Senegal":     { person:"Angela", family:"Gallagher", elo:17, flag:"🇸🇳", display:"Senegal" },
  "Spain":       { person:"Wayne",  family:"Thornhill", elo:1,  flag:"🇪🇸", display:"Spain" },
  "Ecuador":     { person:"Sophie", family:"Thornhill", elo:9,  flag:"🇪🇨", display:"Ecuador" },
  "Switzerland": { person:"Rob",    family:"Dembitz",   elo:13, flag:"🇨🇭", display:"Switzerland" },
  "Uruguay":     { person:"Heather",family:"Dembitz",   elo:14, flag:"🇺🇾", display:"Uruguay" },
  "France":      { person:"Grant",  family:"Davidson",  elo:3,  flag:"🇫🇷", display:"France" },
  "Portugal":    { person:"Pippa",  family:"Davidson",  elo:7,  flag:"🇵🇹", display:"Portugal" },
  "Cape Verde Islands": { person:"Wayne", family:"Thornhill", elo:46, flag:"🇨🇻", display:"Cabo Verde" },
};

const FAMILY_TEAMS = {
  "ET":        [
    {api:"Ivory Coast", flag:"🇨🇮", display:"Côte d'Ivoire"},
    {api:"Iran", flag:"🇮🇷", display:"Iran"},
    {api:"Australia", flag:"🇦🇺", display:"Australia"},
  ],
  "Eede":      [
    {api:"Sweden", flag:"🇸🇪", display:"Sweden"},
    {api:"Qatar", flag:"🇶🇦", display:"Qatar"},
    {api:"United States", flag:"🇺🇸", display:"USA"},
  ],
  "Morrison":  [
    {api:"Congo DR", flag:"🇨🇩", display:"Congo DR"},
    {api:"Morocco", flag:"🇲🇦", display:"Morocco"},
    {api:"Uzbekistan", flag:"🇺🇿", display:"Uzbekistan"},
  ],
  "Pound":     [
    {api:"Ghana", flag:"🇬🇭", display:"Ghana"},
    {api:"Iraq", flag:"🇮🇶", display:"Iraq"},
    {api:"Bosnia-Herzegovina", flag:"🇧🇦", display:"Bosnia & Herz."},
  ],
  "Currie":    [
    {api:"South Korea", flag:"🇰🇷", display:"Korea Republic"},
    {api:"Belgium", flag:"🇧🇪", display:"Belgium"},
    {api:"Egypt", flag:"🇪🇬", display:"Egypt"},
  ],
  "Gallagher": [
    {api:"Canada", flag:"🇨🇦", display:"Canada"},
    {api:"Panama", flag:"🇵🇦", display:"Panama"},
    {api:"Austria", flag:"🇦🇹", display:"Austria"},
  ],
  "Thornhill": [
    {api:"Paraguay", flag:"🇵🇾", display:"Paraguay"},
    {api:"South Africa", flag:"🇿🇦", display:"South Africa"},
    {api:"Algeria", flag:"🇩🇿", display:"Algeria"},
  ],
  "Dembitz":   [
    {api:"Saudi Arabia", flag:"🇸🇦", display:"Saudi Arabia"},
    {api:"Tunisia", flag:"🇹🇳", display:"Tunisia"},
    {api:"Haiti", flag:"🇭🇹", display:"Haiti"},
  ],
  "Davidson":  [
    {api:"Czechia", flag:"🇨🇿", display:"Czechia"},
    {api:"Scotland", flag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿", display:"Scotland"},
    {api:"Jordan", flag:"🇯🇴", display:"Jordan"},
  ],
};

const FLAGS = {
  "Turkey":"🇹🇷","Colombia":"🇨🇴","Brazil":"🇧🇷","Argentina":"🇦🇷",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Norway":"🇳🇴","Mexico":"🇲🇽",
  "Japan":"🇯🇵","Germany":"🇩🇪","Netherlands":"🇳🇱","Senegal":"🇸🇳",
  "Spain":"🇪🇸","Ecuador":"🇪🇨","Switzerland":"🇨🇭","Uruguay":"🇺🇾",
  "France":"🇫🇷","Portugal":"🇵🇹","Cape Verde Islands":"🇨🇻",
  "Ivory Coast":"🇨🇮","Iran":"🇮🇷","Australia":"🇦🇺","Sweden":"🇸🇪",
  "Qatar":"🇶🇦","United States":"🇺🇸","Congo DR":"🇨🇩","Morocco":"🇲🇦",
  "Uzbekistan":"🇺🇿","Ghana":"🇬🇭","Iraq":"🇮🇶","Bosnia-Herzegovina":"🇧🇦",
  "South Korea":"🇰🇷","Belgium":"🇧🇪","Egypt":"🇪🇬","Canada":"🇨🇦",
  "Panama":"🇵🇦","Austria":"🇦🇹","Paraguay":"🇵🇾","South Africa":"🇿🇦",
  "Algeria":"🇩🇿","Saudi Arabia":"🇸🇦","Tunisia":"🇹🇳","Haiti":"🇭🇹",
  "Czechia":"🇨🇿","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Jordan":"🇯🇴",
  "Curaçao":"🇨🇼","New Zealand":"🇳🇿",
};

const DISPLAY = {
  "Turkey":"Türkiye","Cape Verde Islands":"Cabo Verde",
  "Ivory Coast":"Côte d'Ivoire","Bosnia-Herzegovina":"Bosnia",
  "United States":"USA","South Korea":"Korea","Congo DR":"Congo DR",
};

function disp(name) { return DISPLAY[name] || name; }
function flag(name) { return FLAGS[name] || "🏳️"; }

function sweepstakeOwner(name) {
  if (ADULT_TEAMS[name]) return { person: ADULT_TEAMS[name].person, family: ADULT_TEAMS[name].family };
  for (const [fam, teams] of Object.entries(FAMILY_TEAMS)) {
    if (teams.find(t => t.api === name)) return { person: null, family: fam };
  }
  return null;
}

// ── State ───────────────────────────────────────────────────
let allMatches = [];
let allScorers = [];
let standings = {};
let activeTab = 'bracket';

// ── API ─────────────────────────────────────────────────────
async function fetchAPI(path) {
  const url = "/.netlify/functions/matches?path=" + encodeURIComponent(path);
  const res = await fetch(url);
  if (!res.ok) throw new Error("API " + res.status);
  return res.json();
}

async function loadData() {
  document.getElementById("loadingEl").style.display = "flex";
  document.getElementById("errorEl").style.display = "none";
  hideAllContent();

  try {
    const [matchData, scorerData] = await Promise.all([
      fetchAPI("/competitions/" + WC_ID + "/matches"),
      fetchAPI("/competitions/" + WC_ID + "/scorers?limit=10"),
    ]);

    allMatches = matchData.matches || [];
    allScorers = scorerData.scorers || [];
    standings  = buildStandings(allMatches);

    document.getElementById("loadingEl").style.display = "none";
    document.getElementById("lastUpdated").textContent =
      "Updated " + new Date().toLocaleTimeString("en-GB", {hour:"2-digit",minute:"2-digit"});

    renderAll();
    showTab(activeTab);
  } catch(e) {
    document.getElementById("loadingEl").style.display = "none";
    const el = document.getElementById("errorEl");
    el.style.display = "block";
    el.textContent = "⚠️ Failed to load: " + e.message;
  }
}

function buildStandings(matches) {
  const s = {};
  const allTeams = [
    ...Object.keys(ADULT_TEAMS),
    ...Object.values(FAMILY_TEAMS).flat().map(t => t.api),
  ];
  allTeams.forEach(t => {
    s[t] = { stage:"Group Stage", stageOrder:1, goals:0, conceded:0,
              eliminated:false, gamesPlayed:0 };
  });

  const STAGE_ORDER = {
    "GROUP_STAGE":1,"LAST_32":2,"LAST_16":3,
    "QUARTER_FINALS":4,"SEMI_FINALS":5,"THIRD_PLACE":6,"FINAL":7
  };
  const STAGE_LABELS = {
    "GROUP_STAGE":"Group Stage","LAST_32":"Round of 32","LAST_16":"Round of 16",
    "QUARTER_FINALS":"Quarter-Final","SEMI_FINALS":"Semi-Final",
    "THIRD_PLACE":"3rd Place","FINAL":"Final"
  };

  matches.forEach(m => {
    if (m.status !== "FINISHED" && m.status !== "IN_PLAY" && m.status !== "PAUSED") return;
    const h = m.homeTeam?.name, a = m.awayTeam?.name;
    if (!h || !a) return;
    const hG = m.score.fullTime.home ?? 0;
    const aG = m.score.fullTime.away ?? 0;
    const ord = STAGE_ORDER[m.stage] || 1;
    const lbl = STAGE_LABELS[m.stage] || m.stage;

    [h,a].forEach(t => {
      if (!s[t]) s[t] = { stage:lbl, stageOrder:ord, goals:0, conceded:0, eliminated:false, gamesPlayed:0 };
    });

    s[h].goals += hG; s[h].conceded += aG; s[h].gamesPlayed++;
    s[a].goals += aG; s[a].conceded += hG; s[a].gamesPlayed++;

    [h,a].forEach(t => {
      if (ord > s[t].stageOrder) { s[t].stageOrder = ord; s[t].stage = lbl; }
    });

    if (m.status === "FINISHED" && m.stage !== "GROUP_STAGE") {
      let loser = null;
      if (hG > aG) loser = a;
      else if (aG > hG) loser = h;
      else if (m.score.penalties)
        loser = m.score.penalties.home > m.score.penalties.away ? a : h;
      if (loser && s[loser]) s[loser].eliminated = true;
    }
  });
  return s;
}

  // Based on actual WC2026 bracket structure
  const r32_left = [

  // R16 winners so far
  const r16_left = [

  const r16_right = [

    {h:"Mexico",  hS:null, a:"England", aS:null, status:"SCHEDULED", date:"Jul 5"},
    {h:"Arg/CPV", hS:null, a:"Aus/Egy", aS:null, status:"TBD", date:"Jul 7"},
    {h:"Swi/Alg", hS:null, a:"Col/Gha", aS:null, status:"TBD", date:"Jul 7"},

  function matchCard(m, compact=false) {
    if (!m) return `<div class="match"><div class="empty-bracket">TBD</div></div>`;

    const h = m.h, a = m.a;
    const hOwner = sweepstakeOwner(h);
    const aOwner = sweepstakeOwner(a);
    const hasSweep = hOwner || aOwner;
    const isLive = m.status === "IN_PLAY" || m.status === "PAUSED";
    const isFinished = m.status === "FINISHED";

    const hWin = isFinished && m.winner === h;
    const aWin = isFinished && m.winner === a;

    let classes = "match";
    if (hasSweep) classes += " has-sweepstake";
    if (isLive) classes += " live";

    const hBadge = hOwner ? `<span class="sweepstake-badge">${hOwner.person || hOwner.family}</span>` : "";
    const aBadge = aOwner ? `<span class="sweepstake-badge">${aOwner.person || aOwner.family}</span>` : "";

    const hScore = m.hS !== null && m.hS !== undefined ? `<span class="team-score">${m.hS}</span>` : `<span class="team-score" style="color:var(--muted)">-</span>`;
    const aScore = m.aS !== null && m.aS !== undefined ? `<span class="team-score">${m.aS}</span>` : `<span class="team-score" style="color:var(--muted)">-</span>`;

    const hPen = m.hPen !== undefined ? ` <span style="font-size:9px;color:var(--muted)">(${m.hPen}p)</span>` : "";
    const aPen = m.aPen !== undefined ? ` <span style="font-size:9px;color:var(--muted)">(${m.aPen}p)</span>` : "";

    let statusText = "";
    if (isLive) statusText = `<div class="match-status live-text"><span class="live-dot"></span>LIVE</div>`;
    else if (isFinished) statusText = `<div class="match-status">FT${m.hPen !== undefined ? " (pens)" : ""}</div>`;
    else if (m.status === "TBD") statusText = `<div class="match-status tbd">Awaiting R32</div>`;
    else statusText = `<div class="match-status tbd">${m.date || "TBD"}</div>`;

    return `
      <div class="${classes}">
        <div class="match-teams">
          <div class="team-row ${hWin?"winner":isFinished?"loser":""}">
            <span class="team-flag">${flag(h)}</span>
            <span class="team-name">${disp(h)}</span>
            ${hBadge}
            ${hScore}${hPen}
          </div>
          <hr class="match-divider">
          <div class="team-row ${aWin?"winner":isFinished?"loser":""}">
            <span class="team-flag">${flag(a)}</span>
            <span class="team-name">${disp(a)}</span>
            ${aBadge}
            ${aScore}${aPen}
          </div>
        </div>
        ${statusText}
      </div>`;
  }

  // Build live data from allMatches
  function getLiveMatch(team1, team2) {
    const m = allMatches.find(m =>
      (m.homeTeam?.name === team1 && m.awayTeam?.name === team2) ||
      (m.homeTeam?.name === team2 && m.awayTeam?.name === team1)
    );
    if (!m) return null;
    const h = m.homeTeam.name, a = m.awayTeam.name;
    const hG = m.score.fullTime.home, aG = m.score.fullTime.away;
    const isFinished = m.status === "FINISHED";
    let winner = null;
    if (isFinished) {
      if (hG > aG) winner = h;
      else if (aG > hG) winner = a;
      else if (m.score.penalties)
        winner = m.score.penalties.home > m.score.penalties.away ? h : a;
    }
    return { h, a, hS: hG, aS: aG, status: m.status, winner,
      hPen: m.score.penalties?.home, aPen: m.score.penalties?.away };
  }

  // Enrich r32 with live data where available
  function enrichMatch(def) {
    const live = getLiveMatch(def.h, def.a);
    return live || def;
  }

  const leftR32 = r32_left.map(enrichMatch);
  const rightR32 = r32_right.map(enrichMatch);

  const html = `
    <div class="bracket-container">
      <div class="bracket-title">🏆 ROUTE TO THE FINAL</div>

      <!-- STAGE LABELS -->
      <div class="stage-labels">
        <div class="stage-label">Round of 32</div>
        <div class="stage-label">Round of 16</div>
        <div class="stage-label">QF</div>
        <div class="stage-label" style="text-align:center">SF</div>
        <div class="stage-label">QF</div>
        <div class="stage-label">Round of 16</div>
        <div class="stage-label">Round of 32</div>
      </div>

      <!-- LEFT BRACKET -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
        <div>
          <div style="font-size:9px;color:var(--teal-light);font-weight:700;margin-bottom:4px;text-transform:uppercase">Left Half — R32</div>
          ${leftR32.map(m => matchCard(m)).join("")}
        </div>
        <div>
          <div style="font-size:9px;color:var(--teal-light);font-weight:700;margin-bottom:4px;text-transform:uppercase">Left Half — R16</div>
          ${r16_left.map(m => matchCard(m)).join("")}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px 0">
          <div class="trophy">🏆</div>
          <div class="final-label">FINAL</div>
          <div class="final-date">19 July · New Jersey</div>
          ${matchCard({h:"TBD", a:"TBD", hS:null, aS:null, status:"TBD"})}
        </div>
      </div>

      <!-- RIGHT BRACKET -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div>
          <div style="font-size:9px;color:var(--teal-light);font-weight:700;margin-bottom:4px;text-transform:uppercase">Right Half — R16</div>
          ${r16_right.map(m => matchCard(m)).join("")}
        </div>
        <div>
          <div style="font-size:9px;color:var(--teal-light);font-weight:700;margin-bottom:4px;text-transform:uppercase">Right Half — R32</div>
          ${rightR32.map(m => matchCard(m)).join("")}
        </div>
        <div>
          <div style="font-size:9px;color:var(--amber);font-weight:700;margin-bottom:4px;text-transform:uppercase">⭐ Sweepstake Key</div>
          <div style="background:var(--card);border:1px solid var(--own-border);border-radius:8px;padding:10px;font-size:10px;line-height:1.8">
            <div style="color:var(--gold);font-weight:700;margin-bottom:6px">Your teams are highlighted</div>
            ${Object.entries(ADULT_TEAMS).map(([api,info]) => {
              const s = standings[api];
              const out = s?.eliminated;
              return `<div style="${out?"opacity:0.4":""}">
                ${info.flag} <b>${info.person}</b> — ${info.display}
                ${out?"❌":""}
              </div>`;
            }).join("")}
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById("bracketView").innerHTML = html;
}

// ── TEAMS RENDER ────────────────────────────────────────────
function renderTeams() {
  function stageBadgeClass(s) {
    if (s?.eliminated) return "out";
    const o = s?.stageOrder || 0;
    if (o >= 7) return "final";
    if (o >= 5) return "sf";
    if (o >= 4) return "qf";
    if (o >= 3) return "r16";
    if (o >= 2) return "r32";
    return "group";
  }

  function stageLabel(s) {
    if (s?.eliminated) return "❌ " + s.stage;
    return s?.stage || "Group Stage";
  }

  const cards = Object.entries(ADULT_TEAMS).map(([api, info]) => {
    const s = standings[api];
    const cls = stageBadgeClass(s);
    const deep = s && s.stageOrder >= 4 && !s.eliminated;
    return `
      <div class="team-card ${s?.eliminated?"eliminated":""} ${deep?"deep":""}">
        <div class="team-flag-big">${info.flag}</div>
        <div class="team-info">
          <div class="team-person">${info.person}</div>
          <div class="team-country">${info.display}</div>
          <div class="team-goals">⚽ ${s?.goals || 0} goals scored</div>
        </div>
        <div class="team-stage">
          <span class="stage-badge ${cls}">${stageLabel(s)}</span>
        </div>
      </div>`;
  }).join("");

  document.getElementById("teamsView").innerHTML = `
    <div class="teams-container">
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
        Your 18 adult team draws — live stage tracking
      </div>
      ${cards}
    </div>`;
}

// ── PRIZES RENDER ────────────────────────────────────────────
function renderPrizes() {
  const finished = allMatches.filter(m => m.status === "FINISHED");

  function ownerStr(name) {
    const a = ADULT_TEAMS[name];
    if (a) return `${a.person} (${a.flag} ${a.display})`;
    for (const [fam, teams] of Object.entries(FAMILY_TEAMS)) {
      if (teams.find(t => t.api === name)) return `Family ${fam} (${flag(name)} ${disp(name)})`;
    }
    return name;
  }

  const prizes = [];

  // Winner
  const fin = finished.find(m => m.stage === "FINAL");
  if (fin) {
    const h = fin.homeTeam.name, a = fin.awayTeam.name;
    const hG = fin.score.fullTime.home, aG = fin.score.fullTime.away;
    const w = hG > aG ? h : aG > hG ? a : null;
    if (w) prizes.push({ emoji:"🥇", name:"Tournament Winner", pot:"£45", winner:ownerStr(w), confirmed:true });
    const ru = w === h ? a : h;
    prizes.push({ emoji:"🥈", name:"Runner-Up", pot:"£30", winner:ownerStr(ru), confirmed:true });
  } else {
    prizes.push({ emoji:"🥇", name:"Tournament Winner", pot:"£45", winner:null, confirmed:false });
    prizes.push({ emoji:"🥈", name:"Runner-Up", pot:"£30", winner:null, confirmed:false });
  }

  // Third Place
  const third = finished.find(m => m.stage === "THIRD_PLACE");
  if (third) {
    const h = third.homeTeam.name, a = third.awayTeam.name;
    const t = third.score.fullTime.home > third.score.fullTime.away ? h : a;
    prizes.push({ emoji:"🥉", name:"Third Place", pot:"£25", winner:ownerStr(t), confirmed:true });
  } else {
    prizes.push({ emoji:"🥉", name:"Third Place", pot:"£25", winner:null, confirmed:false });
  }

  // Golden Boot
  if (allScorers.length > 0) {
    const topGoals = allScorers[0].goals;
    const tied = allScorers.filter(s => s.goals === topGoals);
    let w;
    if (tied.length === 1) {
      const top = tied[0];
      w = `${top.player?.name} — ${ownerStr(top.team?.name || "")} (${topGoals} goals)`;
    } else {
      w = `🤝 Tied: ` + tied.map(s => `${s.player?.name} (${ownerStr(s.team?.name||"")})`).join(" | ");
    }
    prizes.push({ emoji:"👟", name:"Golden Boot", pot:"£10", winner:w, confirmed:false });
  } else {
    prizes.push({ emoji:"👟", name:"Golden Boot", pot:"£10", winner:null, confirmed:false });
  }

  // Wooden Spoon
  let spoon = null, spoonOrd = 999;
  Object.entries(ADULT_TEAMS).forEach(([t, info]) => {
    const s = standings[t];
    if (s?.eliminated && s.stageOrder < spoonOrd) {
      spoonOrd = s.stageOrder;
      spoon = `${info.person} — ${info.flag} ${info.display} (out: ${s.stage})`;
    }
  });
  prizes.push({ emoji:"😬", name:"Wooden Spoon", pot:"Forfeit", winner:spoon, confirmed:spoonOrd<=2 });

  // First Goal (hardcoded)
  prizes.push({ emoji:"🚀", name:"First Goal of Tournament", pot:"£10", winner:"Krista — 🇲🇽 Mexico", confirmed:true });

  // Family prizes
  const familyPrizes = [];

  // Best of Rest
  let bestFam = null, bestOrd = 0;
  Object.entries(FAMILY_TEAMS).forEach(([fam, teams]) => {
    teams.forEach(t => {
      const s = standings[t.api];
      if (s && s.stageOrder > bestOrd && s.stageOrder > 1) {
        bestOrd = s.stageOrder;
        bestFam = `Family ${fam} — ${t.flag} ${t.display} (reached ${s.stage})`;
      }
    });
  });
  familyPrizes.push({ emoji:"🏅", name:"Best of the Rest", pot:"£40", winner:bestFam, confirmed:false });

  // Giant Killer
  const top18 = new Set(Object.keys(ADULT_TEAMS));
  const famSet = new Set(Object.values(FAMILY_TEAMS).flat().map(t => t.api));
  let giant = null;
  ["knockout","group"].forEach(pass => {
    if (giant) return;
    finished.forEach(m => {
      if (giant) return;
      const isGroup = m.stage === "GROUP_STAGE";
      if (pass === "knockout" && isGroup) return;
      if (pass === "group" && !isGroup) return;
      const h = m.homeTeam.name, a = m.awayTeam.name;
      const hG = m.score.fullTime.home, aG = m.score.fullTime.away;
      let winner, loser;
      if (hG > aG) { winner=h; loser=a; }
      else if (aG > hG) { winner=a; loser=h; }
      else return;
      if (famSet.has(winner) && top18.has(loser)) {
        const fam = Object.entries(FAMILY_TEAMS).find(([f,ts]) => ts.find(t=>t.api===winner))?.[0];
        const wFlag = flag(winner);
        const lFlag = flag(loser);
        giant = `Family ${fam} — ${wFlag} ${disp(winner)} beat ${lFlag} ${disp(loser)}`;
      }
    });
  });
  familyPrizes.push({ emoji:"🤯", name:"Giant Killer", pot:"£20", winner:giant, confirmed:false });

  // Most Goals
  let mostFam = null, mostGoals = 0;
  Object.entries(FAMILY_TEAMS).forEach(([fam, teams]) => {
    const total = teams.reduce((s,t) => s + (standings[t.api]?.goals||0), 0);
    if (total > mostGoals) {
      mostGoals = total;
      mostFam = `Family ${fam} (${total} goals combined)`;
    }
  });
  if (mostGoals > 0) familyPrizes.push({ emoji:"🎯", name:"Most Goals", pot:"£10", winner:mostFam, confirmed:false });
  else familyPrizes.push({ emoji:"🎯", name:"Most Goals", pot:"£10", winner:null, confirmed:false });

  function prizeCard(p) {
    const cls = p.confirmed ? "confirmed" : p.winner ? "leading" : "";
    const statusEl = p.confirmed
      ? `<span class="prize-status confirmed">✅ Confirmed</span>`
      : p.winner
      ? `<span class="prize-status leading">⏳ Leading</span>`
      : "";
    return `
      <div class="prize-card ${cls}">
        <div class="prize-emoji">${p.emoji}</div>
        <div class="prize-info">
          <div class="prize-name">${p.name}</div>
          <div class="prize-winner ${p.winner?"has-winner":""}">${p.winner || "Not yet decided"}</div>
        </div>
        ${statusEl}
        <div class="prize-pot">${p.pot}</div>
      </div>`;
  }

  document.getElementById("prizesView").innerHTML = `
    <div class="prizes-container">
      <div class="prize-section-title">👤 Individual Prizes</div>
      ${prizes.map(prizeCard).join("")}
      <div class="prize-section-title">👨‍👩‍👧‍👦 Family Prizes</div>
      ${familyPrizes.map(prizeCard).join("")}
      <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:16px;text-align:center">
        <div style="font-size:11px;color:var(--muted)">Total Prize Pot</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold)">£190</div>
        <div style="font-size:10px;color:var(--muted)">18 adults × £10 + Wayne's wildcard £10</div>
      </div>
    </div>`;
}

// ── FAMILIES RENDER ─────────────────────────────────────────
function renderFamilies() {
  function stageBadgeClass(s) {
    if (s?.eliminated) return "out";
    const o = s?.stageOrder || 0;
    if (o >= 4) return "qf";
    if (o >= 3) return "r16";
    if (o >= 2) return "r32";
    return "group";
  }

  const html = Object.entries(FAMILY_TEAMS).map(([fam, teams]) => {
    const totalGoals = teams.reduce((s,t) => s + (standings[t.api]?.goals||0), 0);
    const teamCards = teams.map(t => {
      const s = standings[t.api];
      const cls = stageBadgeClass(s);
      return `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:18px">${t.flag}</span>
          <div style="flex:1">
            <div style="font-size:11px;font-weight:600">${t.display}</div>
            <div style="font-size:10px;color:var(--muted)">⚽ ${s?.goals||0} goals</div>
          </div>
          <span class="stage-badge ${cls}">${s?.eliminated?"❌ "+s.stage : s?.stage||"Group Stage"}</span>
        </div>`;
    }).join("");

    return `
      <div class="family-section">
        <div class="family-title">Family ${fam} — ${totalGoals} total goals</div>
        ${teamCards}
      </div>`;
  }).join("");

  document.getElementById("familiesView").innerHTML = `
    <div class="teams-container">
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px">
        Family team draws — 3 teams each, tracking goals and stage
      </div>
      ${html}
    </div>`;
}

function renderAll() {
  renderBracket();
  renderTeams();
  renderPrizes();
  renderFamilies();
}

// ── TAB SWITCHING ────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));

  const tabMap = { bracket:"bracketView", teams:"teamsView", prizes:"prizesView", families:"familiesView" };
  document.querySelectorAll(".tab")[["bracket","teams","prizes","families"].indexOf(tab)]?.classList.add("active");
  const el = document.getElementById(tabMap[tab]);
  if (el) el.classList.add("active");
}

function hideAllContent() {
  document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));
}

// ── AUTO REFRESH every hour ──────────────────────────────────
setInterval(loadData, 60 * 60 * 1000);

// ── INIT ─────────────────────────────────────────────────────
loadData();
</script>
