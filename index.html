  "Pound":[{a:"Ghana",fl:"\u{1F1EC}\u{1F1ED}",d:"Ghana",tla:"GHA"},{a:"Iraq",fl:"\u{1F1EE}\u{1F1F6}",d:"Iraq",tla:"IRQ"},{a:"Bosnia-Herzegovina",fl:"\u{1F1E7}\u{1F1E6}",d:"Bosnia",tla:"BIH"}],
  "Currie":[{a:"South Korea",fl:"\u{1F1F0}\u{1F1F7}",d:"Korea",tla:"KOR"},{a:"Belgium",fl:"\u{1F1E7}\u{1F1EA}",d:"Belgium",tla:"BEL"},{a:"Egypt",fl:"\u{1F1EA}\u{1F1EC}",d:"Egypt",tla:"EGY"}],
  "Gallagher":[{a:"Canada",fl:"\u{1F1E8}\u{1F1E6}",d:"Canada",tla:"CAN"},{a:"Panama",fl:"\u{1F1F5}\u{1F1E6}",d:"Panama",tla:"PAN"},{a:"Austria",fl:"\u{1F1E6}\u{1F1F9}",d:"Austria",tla:"AUT"}],
  "Thornhill":[{a:"Paraguay",fl:"\u{1F1F5}\u{1F1FE}",d:"Paraguay",tla:"PAR"},{a:"South Africa",fl:"\u{1F1FF}\u{1F1E6}",d:"S.Africa",tla:"RSA"},{a:"Algeria",fl:"\u{1F1E9}\u{1F1FF}",d:"Algeria",tla:"ALG"}],
  "Dembitz":[{a:"Saudi Arabia",fl:"\u{1F1F8}\u{1F1E6}",d:"Saudi Arabia",tla:"KSA"},{a:"Tunisia",fl:"\u{1F1F9}\u{1F1F3}",d:"Tunisia",tla:"TUN"},{a:"Haiti",fl:"\u{1F1ED}\u{1F1F9}",d:"Haiti",tla:"HAI"}],
  "Davidson":[{a:"Czechia",fl:"\u{1F1E8}\u{1F1FF}",d:"Czechia",tla:"CZE"},{a:"Scotland",fl:"\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC73\uDB40\uDC63\uDB40\uDC74\uDB40\uDC7F",d:"Scotland",tla:"SCO"},{a:"Jordan",fl:"\u{1F1EF}\u{1F1F4}",d:"Jordan",tla:"JOR"}]
};
var FLAGS={"Turkey":"\u{1F1F9}\u{1F1F7}","Colombia":"\u{1F1E8}\u{1F1F4}","Brazil":"\u{1F1E7}\u{1F1F7}","Argentina":"\u{1F1E6}\u{1F1F7}","England":"\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC65\uDB40\uDC6E\uDB40\uDC67\uDB40\uDC7F","Croatia":"\u{1F1ED}\u{1F1F7}","Norway":"\u{1F1F3}\u{1F1F4}","Mexico":"\u{1F1F2}\u{1F1FD}","Japan":"\u{1F1EF}\u{1F1F5}","Germany":"\u{1F1E9}\u{1F1EA}","Netherlands":"\u{1F1F3}\u{1F1F1}","Senegal":"\u{1F1F8}\u{1F1F3}","Spain":"\u{1F1EA}\u{1F1F8}","Ecuador":"\u{1F1EA}\u{1F1E8}","Switzerland":"\u{1F1E8}\u{1F1ED}","Uruguay":"\u{1F1FA}\u{1F1FE}","France":"\u{1F1EB}\u{1F1F7}","Portugal":"\u{1F1F5}\u{1F1F9}","Cape Verde Islands":"\u{1F1E8}\u{1F1FB}","Ivory Coast":"\u{1F1E8}\u{1F1EE}","Iran":"\u{1F1EE}\u{1F1F7}","Australia":"\u{1F1E6}\u{1F1FA}","Sweden":"\u{1F1F8}\u{1F1EA}","Qatar":"\u{1F1F6}\u{1F1E6}","United States":"\u{1F1FA}\u{1F1F8}","Congo DR":"\u{1F1E8}\u{1F1E9}","Morocco":"\u{1F1F2}\u{1F1E6}","Uzbekistan":"\u{1F1FA}\u{1F1FF}","Ghana":"\u{1F1EC}\u{1F1ED}","Iraq":"\u{1F1EE}\u{1F1F6}","Bosnia-Herzegovina":"\u{1F1E7}\u{1F1E6}","South Korea":"\u{1F1F0}\u{1F1F7}","Belgium":"\u{1F1E7}\u{1F1EA}","Egypt":"\u{1F1EA}\u{1F1EC}","Canada":"\u{1F1E8}\u{1F1E6}","Panama":"\u{1F1F5}\u{1F1E6}","Austria":"\u{1F1E6}\u{1F1F9}","Paraguay":"\u{1F1F5}\u{1F1FE}","South Africa":"\u{1F1FF}\u{1F1E6}","Algeria":"\u{1F1E9}\u{1F1FF}","Saudi Arabia":"\u{1F1F8}\u{1F1E6}","Tunisia":"\u{1F1F9}\u{1F1F3}","Haiti":"\u{1F1ED}\u{1F1F9}","Czechia":"\u{1F1E8}\u{1F1FF}","Scotland":"\uD83C\uDFF4\uDB40\uDC67\uDB40\uDC62\uDB40\uDC73\uDB40\uDC63\uDB40\uDC74\uDB40\uDC7F","Jordan":"\u{1F1EF}\u{1F1F4}"};
var TLA={"Turkey":"TUR","Colombia":"COL","Brazil":"BRA","Argentina":"ARG","England":"ENG","Croatia":"CRO","Norway":"NOR","Mexico":"MEX","Japan":"JPN","Germany":"GER","Netherlands":"NED","Senegal":"SEN","Spain":"ESP","Ecuador":"ECU","Switzerland":"SUI","Uruguay":"URU","France":"FRA","Portugal":"POR","Cape Verde Islands":"CPV","Ivory Coast":"CIV","Iran":"IRN","Australia":"AUS","Sweden":"SWE","Qatar":"QAT","United States":"USA","Congo DR":"COD","Morocco":"MAR","Uzbekistan":"UZB","Ghana":"GHA","Iraq":"IRQ","Bosnia-Herzegovina":"BIH","South Korea":"KOR","Belgium":"BEL","Egypt":"EGY","Canada":"CAN","Panama":"PAN","Austria":"AUT","Paraguay":"PAR","South Africa":"RSA","Algeria":"ALG","Saudi Arabia":"KSA","Tunisia":"TUN","Haiti":"HAI","Czechia":"CZE","Scotland":"SCO","Jordan":"JOR"};
var SO={"GROUP_STAGE":1,"LAST_32":2,"LAST_16":3,"QUARTER_FINALS":4,"SEMI_FINALS":5,"THIRD_PLACE":6,"FINAL":7};
var SL={"GROUP_STAGE":"Group Stage","LAST_32":"Round of 32","LAST_16":"Round of 16","QUARTER_FINALS":"Quarter-Final","SEMI_FINALS":"Semi-Final","THIRD_PLACE":"3rd Place","FINAL":"Final"};
function gt(n){return TLA[n]||n.substring(0,3).toUpperCase();}
function gf(n){return FLAGS[n]||"\uD83C\uDFF3";}
function own(n){
  if(ADULT[n])return ADULT[n].p;
  var fams=Object.keys(FAM);
  for(var i=0;i<fams.length;i++){var ts=FAM[fams[i]];for(var j=0;j<ts.length;j++){if(ts[j].a===n)return"Fam"+fams[i];}}
  return null;
}
var matches=[],scorers=[],std={};
// Group stage eliminations - hardcoded as API cannot auto-detect these
// Teams eliminated in GROUP STAGE only (R32+ eliminations auto-detected)
var GROUP_ELIM = [
  // Adult teams
  "Turkey","Uruguay",
  // Family teams - group stage only
  "Iran","Qatar","Uzbekistan","Iraq","South Korea","Panama","Saudi Arabia","Tunisia","Haiti","Czechia","Scotland","Jordan"
];

function buildStd(ms){
  var s={};
  var all=Object.keys(ADULT);
  Object.keys(FAM).forEach(function(f){FAM[f].forEach(function(t){all.push(t.a);});});
  all.forEach(function(t){s[t]={stage:"Group Stage",stageOrder:1,goals:0,conceded:0,eliminated:false,gamesPlayed:0};});
  (ms||[]).forEach(function(m){
    if(["FINISHED","IN_PLAY","PAUSED"].indexOf(m.status)<0)return;
    var h=m.homeTeam&&m.homeTeam.name,a=m.awayTeam&&m.awayTeam.name;
    if(!h||!a)return;
    var hG=(m.score&&m.score.fullTime&&m.score.fullTime.home)||0;
    var aG=(m.score&&m.score.fullTime&&m.score.fullTime.away)||0;
    var ord=SO[m.stage]||1,lbl=SL[m.stage]||m.stage;
    if(!s[h])s[h]={stage:lbl,stageOrder:ord,goals:0,conceded:0,eliminated:false,gamesPlayed:0};
    if(!s[a])s[a]={stage:lbl,stageOrder:ord,goals:0,conceded:0,eliminated:false,gamesPlayed:0};
    s[h].goals+=hG;s[h].conceded+=aG;s[h].gamesPlayed++;
    s[a].goals+=aG;s[a].conceded+=hG;s[a].gamesPlayed++;
    if(ord>s[h].stageOrder){s[h].stageOrder=ord;s[h].stage=lbl;}
    if(ord>s[a].stageOrder){s[a].stageOrder=ord;s[a].stage=lbl;}
    if(m.status==="FINISHED"&&m.stage!=="GROUP_STAGE"){
      var loser=null;
      if(hG>aG)loser=a;else if(aG>hG)loser=h;
      else if(m.score&&m.score.penalties){loser=m.score.penalties.home>m.score.penalties.away?a:h;}
      if(loser&&s[loser])s[loser].eliminated=true;
    }
  });
  // Apply hardcoded group stage eliminations
  for(var gi=0;gi<GROUP_ELIM.length;gi++){
    var gt2=GROUP_ELIM[gi];
    if(s[gt2]&&s[gt2].stageOrder<=1){
      s[gt2].eliminated=true;
      s[gt2].stage="Group Stage";
    }
  }
  return s;
}
function showErr(msg){
  document.getElementById("errbox").style.display="block";
  document.getElementById("errbox").textContent=msg;
  document.getElementById("ldg").style.display="none";
}
function hideLdg(){document.getElementById("ldg").style.display="none";}
async function loadData(){
  document.getElementById("ldg").style.display="flex";
  document.getElementById("errbox").style.display="none";
  document.querySelectorAll(".pnl").forEach(function(p){p.classList.remove("on");});
  try{
    var mres=await fetch("/.netlify/functions/matches?path="+encodeURIComponent("/competitions/WC/matches"));
    if(!mres.ok)throw new Error("matches API "+mres.status);
    var md=await mres.json();
    var sres=await fetch("/.netlify/functions/matches?path="+encodeURIComponent("/competitions/WC/scorers?limit=10"));
    if(!sres.ok)throw new Error("scorers API "+sres.status);
    var sd=await sres.json();
    matches=md.matches||[];
    scorers=sd.scorers||[];
    std=buildStd(matches);
    document.getElementById("upd").textContent="Updated "+new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    hideLdg();
    try{renderBracket();}catch(e){showErr("Bracket error: "+e.message);return;}
    try{renderTeams();}catch(e){showErr("Teams error: "+e.message);return;}
    try{renderPrizes();}catch(e){showErr("Prizes error: "+e.message);return;}
    try{renderFamilies();}catch(e){showErr("Families error: "+e.message);return;}
    showTab(window._tab||"bracket");
  }catch(e){
    showErr("Failed to load: "+e.message);
  }
}
function getScheduled(stage, matchday){
  // Find a match by stage and matchday even if teams are TBD
  for(var i=0;i<matches.length;i++){
    var m=matches[i];
    if(m.stage===stage && m.matchday===matchday){
      var ukTime="";
      if(m.utcDate){
        var d=new Date(m.utcDate);
        ukTime=d.toLocaleString("en-GB",{timeZone:"Europe/London",weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})+" BST";
      }
      return{ukTime:ukTime,venue:m.venue||""};
    }
  }
  return null;
}
function getMatch(t1,t2){
  var m=null;
  for(var i=0;i<matches.length;i++){
    var mi=matches[i];
    var h=mi.homeTeam&&mi.homeTeam.name,a=mi.awayTeam&&mi.awayTeam.name;
    if((h===t1&&a===t2)||(h===t2&&a===t1)){m=mi;break;}
  }
  if(!m)return null;
  var h=m.homeTeam.name,a=m.awayTeam.name;
  var hG=m.score&&m.score.fullTime&&m.score.fullTime.home;
  var aG=m.score&&m.score.fullTime&&m.score.fullTime.away;
  var fin=m.status==="FINISHED";
  var winner=null;
  if(fin){
    if(hG>aG)winner=h;
    else if(aG>hG)winner=a;
    else if(m.score&&m.score.penalties){winner=m.score.penalties.home>m.score.penalties.away?h:a;}

  if(!P.length){P.push({e:"&#129351;",n:"Tournament Winner",pot:"&#163;45",w:null,c:false});P.push({e:"&#129352;",n:"Runner-Up",pot:"&#163;30",w:null,c:false});}
  var tm=fin.find(function(m){return m.stage==="THIRD_PLACE";});
  if(tm){var th=tm.homeTeam.name,ta=tm.awayTeam.name,tt=tm.score.fullTime.home>tm.score.fullTime.away?th:ta;P.push({e:"&#129353;",n:"Third Place",pot:"&#163;25",w:dsp(tt),c:true});}
  else P.push({e:"&#129353;",n:"Third Place",pot:"&#163;25",w:null,c:false});
  if(scorers.length>0){
    var tG=scorers[0].goals;
    var td=scorers.filter(function(s){return s.goals===tG;});
    var gw=td.length===1?td[0].player.name+" - "+dsp(td[0].team.name)+" ("+tG+" goals)":"Tied: "+td.map(function(s){return s.player.name;}).join(", ")+" ("+tG+" goals)";
     P.push({e:"&#128095;",n:"Golden Boot",pot:"&#163;10",w:gw,c:!!fm});
  }else P.push({e:"&#128095;",n:"Golden Boot",pot:"&#163;10",w:null,c:false});
  P.push({e:"&#128556;",n:"Wooden Spoon",pot:"Forfeit",w:"TC - Japan (out: Round of 32)",c:true});
  P.push({e:"&#128640;",n:"First Goal",pot:"&#163;10",w:"KP - Mexico",c:true});
  var top18=Object.keys(ADULT);
  var famSet=[];Object.keys(FAM).forEach(function(f){FAM[f].forEach(function(t){famSet.push(t.a);});});
    var bestF=null,bestT=null;
  Object.keys(FAM).forEach(function(f){FAM[f].forEach(function(t){var s=std[t.a];if(!s||s.stageOrder<=1)return;var better=false;if(!bestT){better=true;}else if(s.stageOrder>bestT.stageOrder){better=true;}else if(s.stageOrder===bestT.stageOrder){if(!s.eliminated&&bestT.eliminated){better=true;}else if(s.eliminated===bestT.eliminated){if(s.goals>bestT.goals){better=true;}else if(s.goals===bestT.goals&&(s.goals-s.conceded)>(bestT.goals-bestT.conceded)){better=true;}}}if(better){bestT=s;bestF="Family "+f+" - "+t.fl+" "+t.d+" ("+s.stage+")";}});});
  var giant=null;
  var stages=["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINAL","GROUP_STAGE"];
  for(var si=0;si<stages.length&&!giant;si++){
    var stg=stages[si];
    for(var mi=0;mi<fin.length&&!giant;mi++){
      var m=fin[mi];if(m.stage!==stg)continue;
      var mh=m.homeTeam.name,ma=m.awayTeam.name,mhG=m.score.fullTime.home,maG=m.score.fullTime.away;
      var mw=null,ml=null;
      if(mhG>maG){mw=mh;ml=ma;}else if(maG>mhG){mw=ma;ml=mh;}else continue;
      if(famSet.indexOf(mw)>=0&&top18.indexOf(ml)>=0){
        var fks2=Object.keys(FAM);
        for(var fi=0;fi<fks2.length;fi++){var fts=FAM[fks2[fi]];for(var fj=0;fj<fts.length;fj++){if(fts[fj].a===mw){giant="Family "+fks2[fi]+" - "+gf(mw)+" "+gt(mw)+" beat "+gf(ml)+" "+gt(ml);break;}}}
      }
    }
  }
  var mostF=null,mostG=0;
  Object.keys(FAM).forEach(function(f){var tot=FAM[f].reduce(function(s,t){return s+(std[t.a]?std[t.a].goals:0);},0);if(tot>mostG){mostG=tot;mostF="Family "+f+" ("+tot+" goals)";}});
    var famDone=true;
  Object.keys(FAM).forEach(function(f){FAM[f].forEach(function(t){var s=std[t.a];if(!s||!s.eliminated)famDone=false;});});
  var FP=[
    {e:"&#127941;",n:"Best of the Rest",pot:"&#163;40",w:bestF,c:famDone&&!!bestF},
    {e:"&#129327;",n:"Giant Killer",pot:"&#163;20",w:giant,c:!!giant},
    {e:"&#127919;",n:"Most Goals",pot:"&#163;10",w:mostG>0?mostF:null,c:famDone&&mostG>0}
  ];
  function pc(p){
    var cl=p.c?"cf":p.w?"ld":"";
    var st=p.c?"<span class=\"ps cf\">&#9989;</span>":p.w?"<span class=\"ps ld\">&#9203;</span>":"";
    var wcolor=p.w?"#E6EDF3":"#8B949E";
    var wtxt=p.w||"Not yet decided";
    var pcls="pc"+(cl?" "+cl:"");
    return "<div class=\""+pcls+"\"><span style=\"font-size:22px\">"+p.e+"</span><div style=\"flex:1\"><div style=\"font-size:12px;font-weight:700\">"+p.n+"</div><div style=\"font-size:10px;color:"+wcolor+";margin-top:2px\">"+wtxt+"</div></div>"+st+"<div style=\"font-size:16px;font-weight:800;color:#F5C842;flex-shrink:0\">"+p.pot+"</div></div>";
  }
  document.getElementById("prz").innerHTML=
    '<div class="stl">Individual Prizes</div>'+P.map(pc).join("")+
    '<div class="stl">Family Prizes</div>'+FP.map(pc).join("")+
    '<div class="pot"><div style="font-size:11px;color:#8B949E">Total Prize Pot</div><div style="font-size:38px;font-weight:800;color:#F5C842">&#163;190</div><div style="font-size:10px;color:#8B949E">18 adults x &#163;10 + Wayne wildcard &#163;10</div></div>';
}
function renderFamilies(){
  var html="";
  Object.keys(FAM).forEach(function(f){
    var ts=FAM[f];
    var tot=ts.reduce(function(s,t){return s+(std[t.a]?std[t.a].goals:0);},0);
    html+='<div class="fc"><div style="font-size:12px;font-weight:700;color:#0D9B88;margin-bottom:7px">Family '+f+" - "+tot+" goals total</div>";
    ts.forEach(function(t){
      var s=std[t.a];
      html+='<div class="ft'+(s&&s.eliminated?" el":"")+'"><span style="font-size:18px">'+t.fl+'</span><div style="flex:1"><div style="font-size:11px;font-weight:600">'+t.d+'</div><div style="font-size:10px;color:#8B949E">&#9917; '+(s?s.goals:0)+" goals</div></div>"+pill(s)+"</div>";
    });
    html+="</div>";
  });
  document.getElementById("fam").innerHTML=html;
}
function renderAll(){
  renderBracket();
  renderTeams();
  renderPrizes();
  renderFamilies();
}
function showTab(t){
  window._tab=t;
  var tabs=document.querySelectorAll(".tab");
  var names=["bracket","teams","prizes","families"];
  for(var i=0;i<tabs.length;i++)tabs[i].classList.toggle("on",names[i]===t);
  document.querySelectorAll(".pnl").forEach(function(p){p.classList.remove("on");});
  var el=document.getElementById("pnl-"+t);
  if(el)el.classList.add("on");
}
setInterval(loadData,3600000);
loadData();

</script>
